<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Teste Ruas</title>
</head>

<body>

<h1>Teste Dropdown</h1>

<select id="territorio">

  <option value="">Escolha</option>

  <option value="T1">T1</option>
  <option value="T2">T2</option>
  <option value="T3">T3</option>
  <option value="T4">T4</option>

</select>


<select id="rua">

  <option value="">
    Escolha uma rua
  </option>

</select>


<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzvI2BYE4ibw6aGua5R4iN21lISP1PRynHwVrggs10JqyhSYrqnkuswS6pWaXIvP5_6/exec";


let todasRuas = [];


/* CARREGAR RUAS */

async function carregarRuas() {

  try {

    const response =
      await fetch(SCRIPT_URL);

    todasRuas =
      await response.json();

    console.log(todasRuas);

  } catch(error) {

    console.error(error);

  }

}


carregarRuas();


/* TROCAR TERRITÓRIO */

document
  .getElementById("territorio")
  .addEventListener("change", function () {

    const territorio =
      this.value;

    const ruaSelect =
      document.getElementById("rua");

    ruaSelect.innerHTML =
      '<option value="">Escolha uma rua</option>';



    const ruasFiltradas =
      todasRuas.filter(item =>
        item.territorio === territorio
      );



    ruasFiltradas.forEach(item => {

      const option =
        document.createElement("option");

      option.value =
        item.rua;

      option.textContent =
        item.rua;

      ruaSelect.appendChild(option);

    });

});

</script>

</body>
</html>
