<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Relatório de Campo</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{

      background:#f3f5f9;
      padding:20px;

    }

    .container{

      max-width:500px;
      margin:auto;

      background:white;

      padding:25px;

      border-radius:20px;

      box-shadow:
        0 4px 15px rgba(0,0,0,0.08);

    }

    h1{

      text-align:center;
      color:#1e4f7a;

      margin-bottom:8px;

    }

    .subtitle{

      text-align:center;
      color:#666;

      margin-bottom:25px;

      font-size:14px;

    }

    .field{

      margin-bottom:18px;

    }

    label{

      display:block;

      margin-bottom:8px;

      font-weight:bold;

      color:#333;

    }

    select,
    input,
    textarea{

      width:100%;

      padding:14px;

      border-radius:12px;

      border:1px solid #dcdcdc;

      font-size:16px;

      background:white;

    }

    textarea{

      resize:none;

      min-height:110px;

    }

    button{

      width:100%;

      padding:16px;

      border:none;

      border-radius:14px;

      background:#1f7aec;

      color:white;

      font-size:17px;

      font-weight:bold;

      cursor:pointer;

      transition:0.2s;

    }

    button:hover{

      opacity:0.9;

    }

    .success{

      display:none;

      margin-top:18px;

      background:#dff6e4;

      color:#167c3a;

      padding:14px;

      border-radius:12px;

      text-align:center;

      font-weight:bold;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      Relatório de Campo
    </h1>

    <p class="subtitle">
      Preencha as informações da visita.
    </p>


    <!-- TERRITÓRIO -->

    <div class="field">

      <label>
        Território
      </label>

      <select id="territorio">

        <option value="">
          Selecione
        </option>

        <option value="T1">T1</option>
        <option value="T2">T2</option>
        <option value="T3">T3</option>
        <option value="T4">T4</option>

      </select>

    </div>


    <!-- RUA -->

    <div class="field">

      <label>
        Rua
      </label>

      <select id="rua">

        <option value="">
          Selecione um território primeiro
        </option>

      </select>

    </div>


    <!-- NÚMERO -->

    <div class="field">

      <label>
        Número da Casa
      </label>

      <input
        type="text"
        id="numero"
        placeholder="Ex: 125"
      >

    </div>


    <!-- OBSERVAÇÃO -->

    <div class="field">

      <label>
        Observação
      </label>

      <textarea
        id="observacao"
        placeholder="Telefone, revisita, detalhes importantes..."
      ></textarea>

    </div>


    <!-- STATUS -->

    <div class="field">

      <label>
        Status
      </label>

      <select id="status">

       <option>
  Não em casa
</option>

<option>
  Ocupado
</option>

<option selected>
  Falado
</option>

<option>
  Não Aceito
</option>

<option>
  Carta
</option>

      </select>

    </div>


    <!-- BOTÃO -->
<button
  id="submitBtn"
  onclick="enviarFormulario()"
>

  Enviar Relatório

</button>

    <!-- SUCESSO -->

    <div
      class="success"
      id="successMessage"
    >

      Relatório enviado com sucesso!

    </div>

  </div>



  <script>

    // URL API

    const API_URL =
      "https://script.google.com/macros/s/AKfycbz92OWPm4oNWxljE8zG4rzVXp2ljNGR17bQt6VtfTKNdsrg-4gauxWsOMwaG3N0rHkA/exec";



    // CHARGER RUAS

    async function chargerRuas() {

      try {

        const response =
          await fetch(API_URL);

        const data =
          await response.json();

        window.ruasData = data;

      }

      catch(error) {

        console.error(
          "Erro ao carregar ruas:",
          error
        );

      }

    }



    // TERRITÓRIO CHANGE

    document
      .getElementById("territorio")
      .addEventListener("change", function () {

        const territorio =
          this.value;

        const ruaSelect =
          document.getElementById("rua");

        ruaSelect.innerHTML =
          '<option value="">Selecione</option>';

        const ruasFiltradas =
          window.ruasData.filter(function(item){

            return item.territorio === territorio;

          });

        ruasFiltradas.forEach(function(item){

          const option =
            document.createElement("option");

          option.value = item.rua;

          option.textContent = item.rua;

          ruaSelect.appendChild(option);

        });

      });



    // ENVIAR FORMULÁRIO

    async function enviarFormulario() {

      const territorio =
        document.getElementById("territorio").value;

      const rua =
        document.getElementById("rua").value;

      const numero =
        document.getElementById("numero").value;

      const observacao =
        document.getElementById("observacao").value;

      const status =
        document.getElementById("status").value;



      // VALIDATION

      if (
        !territorio ||
        !rua ||
        !numero ||
        !status
      ) {

        alert(
          "Preencha todos os campos obrigatórios."
        );

        return;

      }



      const dados = {

        territorio: territorio,
        rua: rua,
        numero: numero,
        observacao: observacao,
        status: status

      };
// LOADING

const btn =
  document.getElementById("submitBtn");

btn.disabled = true;

btn.innerText =
  "Enviando...";


      try {

        await fetch(API_URL, {

          method: "POST",

          body: JSON.stringify(dados)

        });



        // SUCCESS

        document
          .getElementById("successMessage")
          .style.display = "block";

          // VIBRATION

if (navigator.vibrate) {

  navigator.vibrate(200);

}



        // RESET

        document
          .getElementById("territorio")
          .value = "";

        document
          .getElementById("rua")
          .innerHTML =
          '<option value="">Selecione um território primeiro</option>';

        document
          .getElementById("numero")
          .value = "";

        document
          .getElementById("observacao")
          .value = "";

        document
          .getElementById("status")
          .value = "";

// RESTORE BUTTON

btn.disabled = false;

btn.innerText =
  "Enviar Relatório";

        setTimeout(function(){

          document
            .getElementById("successMessage")
            .style.display = "none";

        }, 3000);

      }

      catch(error) {

        console.error(error);

        alert(
          "Erro ao enviar relatório."
        );

btn.disabled = false;

btn.innerText =
  "Enviar Relatório";


      }

    }



    // INIT

    chargerRuas();

  </script>

</body>
</html>
